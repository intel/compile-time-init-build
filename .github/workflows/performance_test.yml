name: Performance Tests
permissions: read-all

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    branches: [ main ]

env:
  DEBIAN_FRONTEND: noninteractive
  CMAKE_GENERATOR: Ninja
  BUILD_TYPE: Release
  DEFAULT_CXX_STANDARD: 23
  DEFAULT_LLVM_VERSION: 22

jobs:
  performance_test:
    runs-on: ${{ github.repository_owner == 'intel' && 'intel-' || '' }}ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build tools
        run: |
          DISTRO=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb https://apt.llvm.org/$DISTRO/" "llvm-toolchain-$DISTRO-${{env.DEFAULT_LLVM_VERSION}}" main
          sudo apt update && sudo apt install -y ninja-build clang-${{env.DEFAULT_LLVM_VERSION}}

      - name: Configure CMake
        env:
          CC: "/usr/lib/llvm-${{env.DEFAULT_LLVM_VERSION}}/bin/clang"
          CXX: "/usr/lib/llvm-${{env.DEFAULT_LLVM_VERSION}}/bin/clang++"
        run: cmake -B ${{github.workspace}}/build -DCMAKE_CXX_STANDARD=${{env.DEFAULT_CXX_STANDARD}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        shell: bash
        run: |
          # compile-time benchmarks: <cmake target>|<summary label>
          benchmarks=(
            "compilation_nexus_benchmark|cib nexus"
            "compilation_flow_benchmark|flow dsl"
          )

          for entry in "${benchmarks[@]}"; do
            IFS='|' read -r target label <<< "$entry"
            log="${{github.workspace}}/build/${target}.log"

            # interesting summary data on stderr
            cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -t "$target" 2>&1 | tee "$log"
            front_end_time=$(awk '/Front end/ {print $1}' "$log")

            # generate summary with an expandable section per benchmark
            {
              echo "<details>"
              echo "  <summary>${label} clang front-end: ${front_end_time} seconds</summary>"
              echo ""
              echo "  \`\`\`"
              cat "$log"
              echo "  \`\`\`"
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          done

